<!DOCTYPE html>
<html>
<body style="text-align:center; background-color: lavender;">

<h1>抽小卡 🎴</h1>

<img id="card" src="card1.jpg" width="200">

<br><br>

<button onclick="drawCard()">抽卡</button>

<script>
function drawCard() {
  let cards = ["card1.jpg", "card2.jpg", "card3.jpg"];
  let random = Math.floor(Math.random() * cards.length);
  document.getElementById("card").src = cards[random];
}
</script>

</body>
</html>
